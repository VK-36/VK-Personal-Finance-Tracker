<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assets</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
    font-size: 22px;
    position: relative;
}

/* ADD BUTTON */
.add-btn {
    position: absolute;
    right: 20px;
    top: 15px;
    background: #22c55e;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.add-btn:hover {
    background: #16a34a;
}

/* TABLE */
.table-container {
    width: 95%;
    margin: 20px auto;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

th {
    color: #94a3b8;
}

.history-btn {
    position: absolute;
    left: 20px;
    top: 15px;
    background: #334155;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    color: white;
    cursor: pointer;
}

.history-btn:hover {
    background: #475569;
}

/* ACTION BUTTONS */
button {
    padding: 6px 10px;
    margin: 2px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

/* DASHBOARD BUTTON */
.dashboard-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #334155;
    border: none;
    padding: 12px 16px;
    border-radius: 50px;
    color: white;
    cursor: pointer;
}

.dashboard-btn:hover {
    background: #475569;
}
</style>
</head>

<body>

<div class="header">
    Assets
    <button class="add-btn" onclick="goToAdd()">+ Add</button>
    <button class="history-btn" onclick="goHistory()">📜 History</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Asset</th>
<th>Type</th>
<th>Units</th>
<th>Invested</th>
<th>Current</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="assetTable"></tbody>
</table>
</div>

<button class="dashboard-btn" onclick="goDashboard()">🏠</button>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

function loadAssetsRealtime() {

    let table = document.getElementById("assetTable");

    db.collection("assets").onSnapshot(snapshot => {

        table.innerHTML = "";

        snapshot.forEach(doc => {
            let a = doc.data();

            table.innerHTML += `
            <tr>
                <td>${a.name || "-"}</td>
                <td>${a.type || "-"}</td>
                <td>${a.units || "-"}</td>
                <td>₹${a.invested || 0}</td>
                <td>₹${a.currentValue || 0}</td>
                <td>${a.date || "-"}</td>
                <td>
                    <button onclick="editAsset('${doc.id}')">✏️</button>
                    <button onclick="sellAsset('${doc.id}')">💰</button>
                </td>
            </tr>
            `;
        });

    });
}

/* EDIT */
function editAsset(id) {
    localStorage.setItem("edit_asset_id", id);
    window.location.href = "add-asset.html";
}

/* SELL */
async function sellAsset(id) {

    if (!confirm("Sell this asset?")) return;

    try {
        let docRef = db.collection("assets").doc(id);
        let docSnap = await docRef.get();

        if (!docSnap.exists) return;

        let a = docSnap.data();

        /* 🔥 ADD TO HISTORY (SELL) */
        await db.collection("history").add({
            type: "sell",
            category: "asset",
            name: a.name,
            amount: a.currentValue,
            units: a.units,
            date: new Date().toISOString().split("T")[0]
        });

        /* DELETE FROM ASSETS */
        await docRef.delete();

        alert("Asset Sold ✅");

    } catch (error) {
        console.error("Sell error:", error);
    }
}
/* NAVIGATION */
function goToAdd() {
    window.location.href = "add-asset.html";
}

function goDashboard() {
    window.location.href = "dashboard.html";
}

 loadAssetsRealtime();
    
function goHistory() {
    window.location.href = "history.html";
}

</script>

</body>
</html>
