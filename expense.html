
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense - VKIC</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
    font-size: 22px;
}

.container {
    width: 90%;
    max-width: 500px;
    margin: 20px auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    box-sizing: border-box;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #ef4444;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #dc2626;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #334155;
    font-size: 14px;
}

th {
    color: #94a3b8;
}

.action-wrapper {
    display: flex;
    gap: 6px;
}

.action-btn {
    flex: 1;
    height: 32px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: white;
}

.edit {
    background: #3b82f6;
}

.delete {
    background: #ef4444;
}

.back-btn {
    display: block;
    width: 90%;
    max-width: 500px;
    margin: 10px auto;
    padding: 10px;
    background: #334155;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Expense Tracker</div>

<div class="container">

    <!-- TOTAL -->
    <div class="card">
        <h3>Total Expense: ₹<span id="totalExpense">0</span></h3>
    </div>

    <!-- FORM -->
    <div class="card">
        <input type="number" id="amount" placeholder="Amount (₹)">
        
        <select id="category">
            <option>Food</option>
            <option>Travel</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Entertainment</option>
            <option>Other</option>
        </select>

        <input type="date" id="date">
        <input type="text" id="note" placeholder="Note (optional)">

        <button class="btn" onclick="addExpense()" id="mainBtn">Add Expense</button>
    </div>

    <!-- TABLE -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>₹</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Note</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
        </table>
    </div>

</div>

<button class="back-btn" onclick="goBack()">⬅ Back to Finance Dashboard</button>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let editId = null;

/* LOAD */
async function loadExpense() {

    let table = document.getElementById("expenseTable");
    let total = 0;

    table.innerHTML = "";

    let snapshot = await db.collection("expense").get();

    snapshot.forEach((doc) => {
        let item = doc.data();

        total += item.amount;

        table.innerHTML += `
            <tr>
                <td>₹${item.amount}</td>
                <td>${item.category}</td>
                <td>${item.date}</td>
                <td>${item.note || "-"}</td>
                <td>
                    <div class="action-wrapper">
                        <button class="action-btn edit" onclick='editExpense("${doc.id}", ${JSON.stringify(item)})'>Edit</button>
                        <button class="action-btn delete" onclick="deleteExpense('${doc.id}')">Del</button>
                    </div>
                </td>
            </tr>
        `;
    });

    document.getElementById("totalExpense").innerText = total;
}

/* ADD / UPDATE */
async function addExpense() {

    let amount = parseFloat(document.getElementById("amount").value);
    let category = document.getElementById("category").value;
    let date = document.getElementById("date").value;
    let note = document.getElementById("note").value;

    if (!amount || !date) {
        alert("Enter amount and date");
        return;
    }

    let newExpense = { amount, category, date, note };

    try {

        if (editId === null) {
            await db.collection("expense").add(newExpense);
        } else {
            await db.collection("expense").doc(editId).update(newExpense);
            editId = null;
            document.getElementById("mainBtn").innerText = "Add Expense";
        }

        clearForm();
        loadExpense();

    } catch (error) {
        console.error("Error:", error);
    }
}

/* EDIT */
function editExpense(id, item) {

    document.getElementById("amount").value = item.amount;
    document.getElementById("category").value = item.category;
    document.getElementById("date").value = item.date;
    document.getElementById("note").value = item.note;

    editId = id;

    document.getElementById("mainBtn").innerText = "Update Expense";
}

/* DELETE */
async function deleteExpense(id) {

    try {
        await db.collection("expense").doc(id).delete();
        loadExpense();
    } catch (error) {
        console.error("Error deleting:", error);
    }
}

/* CLEAR */
function clearForm() {
    document.getElementById("amount").value = "";
    document.getElementById("date").value = "";
    document.getElementById("note").value = "";
}

/* NAV */
function goBack() {
    window.location.href = "finance.html";
}

/* INIT */
loadExpense();

</script>

</body>
</html>
