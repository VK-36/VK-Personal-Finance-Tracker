<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Form - VKIC</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        input {
            padding: 10px;
            margin: 6px;
            width: 240px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .back {
            margin-top: 10px;
            cursor: pointer;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2 id="title">Add Asset</h2>
    <div id="infoBox"></div>

<input type="text" id="name" name="name" placeholder="Asset Name" autocomplete="off">
<input type="number" id="buy" name="buy" placeholder="Buy Price" autocomplete="off">
<input type="number" id="units" name="units" placeholder="Units" autocomplete="off">
<input type="number" id="current" name="current" placeholder="Current Price" autocomplete="off">
<input type="date" id="date" name="date" autocomplete="off">

    <button onclick="saveAsset()">Save Asset</button>
    <div class="back" onclick="goBack()">← Back</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
    // 🔥 IMPORTANT: MAKE SURE THIS EXISTS
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
    };

    // INIT FIREBASE
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    console.log("Firebase initialized:", db);

    // FLOW DATA
    let type = localStorage.getItem("vkic_type");
    let subtype = localStorage.getItem("vkic_subtype");
    let editId = localStorage.getItem("edit_asset_id");

    // UI SETUP
    if (editId) {
        document.getElementById("title").innerText = "Edit Asset";
    }

    document.getElementById("infoBox").innerText =
        `Type: ${type || "-"} | Sub Type: ${subtype || "-"}`;

    // LOAD
    async function loadAsset() {
        if (!editId) return;

        try {
            let doc = await db.collection("assets").doc(editId).get();
            console.log("Loaded doc:", doc);

            if (doc.exists) {
                let a = doc.data();
                name.value = a.name || "";
                buy.value = a.buy || "";
                units.value = a.units || "";
                current.value = a.current || "";
                date.value = a.date || "";
            }
        } catch (e) {
            console.error("LOAD ERROR:", e);
            alert("Error loading asset. Check console.");
        }
    }

    // SAVE
    async function saveAsset() {
        try {
            let nameVal = name.value;
            let buyVal = parseFloat(buy.value);
            let unitsVal = parseFloat(units.value);
            let currentVal = parseFloat(current.value);
            let dateVal = date.value;

            if (!nameVal || !buyVal || !unitsVal || !currentVal || !dateVal) {
                alert("Fill all fields");
                return;
            }

            let invested = buyVal * unitsVal;
            let currentValue = currentVal * unitsVal;
            let profit = currentValue - invested;

            let asset = {
                type,
                subtype,
                name: nameVal,
                buy: buyVal,
                units: unitsVal,
                current: currentVal,
                invested,
                currentValue,
                profit,
                date: dateVal,
                updatedAt: new Date()
            };

            console.log("Saving:", asset);

            if (editId) {
                await db.collection("assets").doc(editId).update(asset);
                alert("Updated ✅");
            } else {
                await db.collection("assets").add(asset);
                alert("Added ✅");
            }

        } catch (e) {
            console.error("SAVE ERROR:", e);
            alert("Error saving. Check console.");
        }
    }

    function goBack() {
        window.location.href = "asset-subtype.html";
    }

    loadAsset();
</script>

</body>
</html>
