<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VK Personal Finance Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
    font-size: 22px;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 30px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 180px;
    text-align: center;
}

.networth {
    width: 220px;
}

.row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

/* Center row (Net Worth) */
.row.center {
    justify-content: center;
}

.value {
    font-size: 18px;
    margin-top: 8px;
}

.btn {
    display: block;
    width: 85%;
    max-width: 320px;
    margin: 12px auto;
    padding: 12px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<div class="header">VK Personal Finance Dashboard</div>

<div class="container">

    <!-- Row 1 -->
    <div class="row">
        <div class="card"><div>Invested</div><div class="value" id="invested">₹0</div></div>
        <div class="card"><div>Value</div><div class="value" id="value">₹0</div></div>
        <div class="card"><div>Profit</div><div class="value" id="profit">₹0</div></div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="card"><div>Income</div><div class="value" id="income">₹0</div></div>
        <div class="card"><div>Expense</div><div class="value" id="expense">₹0</div></div>
        <div class="card"><div>Savings</div><div class="value" id="savings">₹0</div></div>
        <div class="card"><div>Cash</div><div class="value" id="cash">₹0</div>
</div>
    </div>

    <!-- Row 3 -->
    <div class="row center">
        <div class="card networth">
            <div>Net Worth</div>
            <div class="value" id="netWorth">₹0</div>
        </div>
    </div>

</div>

<div class="buttons">
    <button class="btn" onclick="goToAssets()">Assets Page</button>
    <button class="btn" onclick="goToFinance()">Income & Expense Page</button>
    <button class="btn" onclick="goToGoals()">Goal Tracker</button>
</div>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
function formatMoney(num) {
    return "₹" + num.toLocaleString("en-IN");
}

// ✅ Central state (fixes async issues)
let state = {
    invested: 0,
    value: 0,
    income: 0,
    expense: 0,
    cash: 0
};

// ✅ Update UI
function updateUI() {
    let profit = state.value - state.invested;
    let savings = state.income - state.expense;
    let netWorth = state.value + state.cash + savings;

    document.getElementById("invested").innerText = formatMoney(state.invested);
    document.getElementById("value").innerText = formatMoney(state.value);
    document.getElementById("profit").innerText = formatMoney(profit);

    document.getElementById("income").innerText = formatMoney(state.income);
    document.getElementById("expense").innerText = formatMoney(state.expense);
    document.getElementById("savings").innerText = formatMoney(savings);
    document.getElementById("cash").innerText = formatMoney(state.cash);

    document.getElementById("netWorth").innerText = formatMoney(netWorth);
}

// ✅ Load realtime data
function loadDashboardRealtime() {

    // 🔥 Assets
    db.collection("assets").onSnapshot(snapshot => {
        let invested = 0;
        let value = 0;

        snapshot.forEach(doc => {
            let a = doc.data();
            invested += a.invested || 0;
            value += a.currentValue || 0;
        });

        state.invested = invested;
        state.value = value;

        updateUI();
    });

    // 🔥 Income
    db.collection("income").onSnapshot(snapshot => {
        let income = 0;

        snapshot.forEach(doc => {
            income += doc.data().amount || 0;
        });

        state.income = income;

        updateUI();
    });

    // 🔥 Expense
    db.collection("expense").onSnapshot(snapshot => {
        let expense = 0;

        snapshot.forEach(doc => {
            expense += doc.data().amount || 0;
        });

        state.expense = expense;

        updateUI();
    });

    // 🔥 Cash
db.collection("cash").onSnapshot(snapshot => {
    let cash = 0;

    snapshot.forEach(doc => {
        cash += Number(doc.data().amount) || 0;
    });

    state.cash = cash;

    safeUpdateUI(); // or updateUI() if you didn’t add safeUpdate yet
});
}

// Navigation
function goToAssets() {
    window.location.href = "assets.html";
}

function goToFinance() {
    window.location.href = "finance.html";
}

function goToGoals() {
    window.location.href = "goal-tracker.html";
}

// 🚀 Start
loadDashboardRealtime();
</script>

</body>
</html>
