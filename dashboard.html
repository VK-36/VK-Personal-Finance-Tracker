<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VKIC Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
    font-size: 22px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    width: 150px;
    text-align: center;
    margin: 10px;
}

.value {
    font-size: 18px;
    margin-top: 8px;
}

.btn {
    display: block;
    width: 85%;
    max-width: 320px;
    margin: 12px auto;
    padding: 12px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<div class="header">VKIC Dashboard</div>

<div class="container">
    <div class="card"><div>Invested</div><div class="value" id="invested">₹0</div></div>
    <div class="card"><div>Value</div><div class="value" id="value">₹0</div></div>
    <div class="card"><div>Profit</div><div class="value" id="profit">₹0</div></div>

    <div class="card"><div>Income</div><div class="value" id="income">₹0</div></div>
    <div class="card"><div>Expense</div><div class="value" id="expense">₹0</div></div>
    <div class="card"><div>Savings</div><div class="value" id="savings">₹0</div></div>

    <div class="card"><div>Cash</div><div class="value" id="cash">₹0</div></div>
    <div class="card"><div>Net Worth</div><div class="value" id="netWorth">₹0</div></div>
</div>

<button class="btn" onclick="goToAssets()">Assets Page</button>
<button class="btn" onclick="goToFinance()">Income & Expense Page</button>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
async function loadDashboard() {

    let totalInvested = 0;
    let totalValue = 0;

    let assetSnap = await db.collection("assets").get();
    assetSnap.forEach(doc => {
        let a = doc.data();
        totalInvested += a.invested || 0;
        totalValue += a.currentValue || 0;
    });

    let totalIncome = 0;
    let incomeSnap = await db.collection("income").get();
    incomeSnap.forEach(doc => {
        totalIncome += doc.data().amount || 0;
    });

    let totalExpense = 0;
    let expenseSnap = await db.collection("expense").get();
    expenseSnap.forEach(doc => {
        totalExpense += doc.data().amount || 0;
    });

    let profit = totalValue - totalInvested;
    let savings = totalIncome - totalExpense;
    let cash = savings;
    let netWorth = cash + totalValue;

    document.getElementById("invested").innerText = "₹" + totalInvested;
    document.getElementById("value").innerText = "₹" + totalValue;
    document.getElementById("profit").innerText = "₹" + profit;

    document.getElementById("income").innerText = "₹" + totalIncome;
    document.getElementById("expense").innerText = "₹" + totalExpense;
    document.getElementById("savings").innerText = "₹" + savings;

    document.getElementById("cash").innerText = "₹" + cash;
    document.getElementById("netWorth").innerText = "₹" + netWorth;
}

function goToAssets() {
    window.location.href = "assets.html";
}

function goToFinance() {
    window.location.href = "finance.html";
}

loadDashboard();
</script>

</body>
</html>
