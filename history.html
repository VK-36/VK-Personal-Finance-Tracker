<!DOCTYPE html>
<html>
<head>
<title>History</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    background: #1e293b;
    font-size: 22px;
}

table {
    width: 95%;
    margin: 20px auto;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

th {
    color: #94a3b8;
}

/* COLORS */
.buy { color: #22c55e; }
.sell { color: #ef4444; }
.income { color: #22c55e; }
.expense { color: #ef4444; }

/* DASHBOARD BUTTON */
.dashboard-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #334155;
    padding: 12px;
    border-radius: 50px;
    border: none;
    color: white;
}
</style>
</head>

<body>

<div class="header">History</div>

<table>
<thead>
<tr>
<th>Type</th>
<th>Name</th>
<th>Amount</th>
<th>Units</th>
<th>Date</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>
</table>

<button class="dashboard-btn" onclick="goDashboard()">🏠</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
async function loadHistory() {

    let table = document.getElementById("historyTable");
    table.innerHTML = "";

    let snap = await db.collection("history").orderBy("date", "desc").get();

    snap.forEach(doc => {
        let h = doc.data();

        table.innerHTML += `
        <tr>
            <td class="${h.type}">${h.type}</td>
            <td>${h.name || "-"}</td>
            <td>₹${h.amount || 0}</td>
            <td>${h.units || "-"}</td>
            <td>${h.date || "-"}</td>
        </tr>
        `;
    });
}

function goDashboard() {
    window.location.href = "dashboard.html";
}

loadHistory();
</script>

</body>
</html>
