<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold/Silver Asset - VKIC</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

input {
    padding: 10px;
    margin: 6px;
    width: 240px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #eab308;
    border: none;
    color: black;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ca8a04;
}
</style>
</head>

<body>

<div class="container">

    <h2>Add Gold/Silver</h2>

    <input type="text" id="name" placeholder="Gold / Silver">
    <input type="number" id="buy" placeholder="Buy Price per gram">
    <input type="number" id="grams" placeholder="Quantity (grams)">
    <input type="number" id="current" placeholder="Current Price per gram">
    <input type="date" id="date">

    <button onclick="saveAsset()">Save</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>

let type = "commodity";
let subtype = "gold/silver";

async function saveAsset() {

    let name = document.getElementById("name").value;
    let buy = parseFloat(document.getElementById("buy").value);
    let grams = parseFloat(document.getElementById("grams").value);
    let current = parseFloat(document.getElementById("current").value);
    let date = document.getElementById("date").value;

    if (!name || !buy || !grams || !current || !date) {
        alert("Fill all fields");
        return;
    }

    let invested = buy * grams;
    let currentValue = current * grams;
    let profit = currentValue - invested;
    let returnPercent = ((profit / invested) * 100).toFixed(2);

    let asset = {
        type,
        subtype,
        name,
        buy,
        grams,
        current,
        invested,
        currentValue,
        profit,
        returnPercent,
        date,
        createdAt: new Date()
    };

    await db.collection("assets").add(asset);

    alert("Saved ✅");
    window.location.href = "assets.html";
}

</script>

</body>
</html>
